<div id="fruitModal" class="modal">
    <div class="modal-content">
        <h2 id="modalName" style="font-family:'Bebas Neue'; font-size:3rem; margin:0; color:var(--orange);"></h2>
        <img id="modalImg" src="" style="width:180px; margin:20px 0;">
        
        <div style="margin-bottom:20px;">
            <span id="oldPrice" style="text-decoration:line-through; color:#95a5a6; font-size:1.2rem; display:none; margin-right:10px;"></span>
            <span id="modalPrice" style="font-size:2.5rem; font-weight:900; color:var(--accent);"></span>
        </div>

        <!-- ✅ NOUVEAU : choix du lieu -->
        <select id="meetingPoint" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px;">
            <option value="">Choisir un lieu de rencontre</option>
            <option value="Blacé (prioritaire)">📍 Blacé (prioritaire)</option>
            <option value="Gare de Villefranche">Gare de Villefranche-sur-Saône</option>
            <option value="Parc Lamartine">Parc Lamartine</option>
            <option value="Parc Simone Veil">Parc Simone Veil</option>
            <option value="Parc Belle Province">Parc Belle Province</option>
        </select>

        <button id="buyButton" class="buy-button">ACHETER</button>

        <!-- petit bonus -->
        <p style="font-size:0.85rem; color:#7f8c8d; margin-top:10px;">
        📍 Blacé recommandé pour une livraison rapide
        </p>

        <p onclick="closeModal()" style="cursor:pointer; margin-top:20px; color:#7f8c8d;">Fermer</p>
    </div>
</div>
